---
- name: remove test tasks before test
  include_tasks: clean.yml

- block:
  - name: create task under SYSTEM context
    community.windows.win_scheduled_task:
      name: MyTest
      username: SYSTEM
      logon_type: service_account
      run_level: highest
      state: present
      actions:
      - path: cmd
        argument: /c echo hi
    become: true
    become_method: runas
    become_user: SYSTEM

  - name: Test failure scenarios
    include_tasks: failures.yml

  - name: Test normal scenarios
    include_tasks: tests.yml

  - include_tasks: clean.yml

  - name: Test principals
    include_tasks: principals.yml

  - include_tasks: clean.yml

  - name: Test triggers
    include_tasks: triggers.yml

  always:
  - name: remove test tasks after test
    include_tasks: clean.ymli

  - name: remove test SYSTEM created task
    community.windows.win_scheduled_task:
      name: MyTest
      state: absent
